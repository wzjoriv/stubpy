name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]          # rebuild on every push to main
  workflow_dispatch:           # allow manual trigger from GitHub UI

# Allow this job to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install stubpy and docs dependencies
        run: pip install -e ".[docs]"

      - name: Build Sphinx HTML docs
        run: sphinx-build -b html docs docs/_build/html

      # Upload the built HTML as a Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
